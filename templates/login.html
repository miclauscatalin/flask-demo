{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
  <h2 data-i18n="login_title">Autentificare</h2>

  <form method="post" class="card">
    {{ form.hidden_tag() }}

    <label>{{ form.username.label }}</label>
    {{ form.username(class_="input") }}

    <label>{{ form.password.label }}</label>
    {{ form.password(class_="input") }}

    <label class="check">
      {{ form.remember() }} <span>{{ form.remember.label.text }}</span>
    </label>

    <div class="row">
      {{ form.submit(class_="btn") }}
      <a class="btn outline" href="{{ url_for('register') }}" data-i18n="login_create">Creează cont</a>
    </div>

    <div style="text-align:center; margin-top:10px; font-size:.84rem;">
      <a href="{{ url_for('forgot_password') }}" style="color:var(--text-3);" data-i18n="login_forgot">Am uitat parola</a>
    </div>
  </form>
{% endblock %}
